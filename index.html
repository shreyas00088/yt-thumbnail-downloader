<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>YT Thumbnail Grabber</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; text-align: center; background: #f0f0f0; }
    input { width: 80%; max-width: 400px; padding: 10px; font-size: 16px; margin-top: 20px; }
    button { padding: 10px 20px; font-size: 16px; margin-top: 10px; cursor: pointer; }
    img { margin-top: 20px; max-width: 90%; border: 1px solid #ccc; }
    a.download-btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>YouTube Thumbnail Grabber</h1>
  <input id="ytLink" type="text" placeholder="Paste YouTube video link here" />
  <br />
  <button onclick="showThumbnail()">Get Thumbnail</button>
  <div id="result"></div>

  <script>
function getVideoId(url) {
  let regExp = /(?:youtube\.com.*v=|youtu\.be\/)([^&]+)/;
  let match = url.match(regExp);
  return match ? match[1] : null;
}

function getThumb() {
  let url = document.getElementById("url").value;
  let id = getVideoId(url);

  if (!id) {
    alert("Invalid URL");
    return;
  }

  let sizes = [
    {name: "HD", file: "maxresdefault.jpg"},
    {name: "HQ", file: "hqdefault.jpg"},
    {name: "SD", file: "sddefault.jpg"}
  ];

  let html = "";

  sizes.forEach(size => {
    let link = `https://img.youtube.com/vi/${id}/${size.file}`;
    html += `
      <div>
        <h3>${size.name} Quality</h3>
        <img src="${link}" width="300">
        <br>
        <a href="${link}" download style="color:yellow;">Download</a>
      </div>
    `;
  });

  document.getElementById("output").innerHTML = html;
}
</script>

<style>

    }
